# agentgateway-bootstrap configuration

# Upstream agentgateway-crds Helm chart configuration
agentgatewayCrdsChart:
  repoURL: oci://cr.agentgateway.dev/charts
  # renovate: datasource=docker depName=cr.agentgateway.dev/charts/agentgateway-crds
  version: 1.3.1

# Upstream agentgateway Helm chart configuration
agentgatewayChart:
  repoURL: oci://cr.agentgateway.dev/charts
  # renovate: datasource=docker depName=cr.agentgateway.dev/charts/agentgateway
  version: 1.3.1

# ArgoCD project name
argoProject: default

# Environment configuration for variable substitution
environmentConfig:
  resourcePrefix: ""
  region: ""
  accountId: ""

# Amazon Bedrock LLM Provider configuration
bedrock:
  # Enable Amazon Bedrock backend and route configuration
  enabled: true
  # AWS Region for Amazon Bedrock (supports ${region} variable substitution)
  region: us-east-1
  # Default Bedrock model (e.g. amazon.nova-micro-v1:0, us.anthropic.claude-3-5-sonnet-20241022-v2:0)
  model: amazon.nova-micro-v1:0
  # Authentication configuration
  auth:
    # Auth type: "irsa" (default - IAM Roles for Service Accounts via the
    # cluster's pod-identity webhook and an externally-provisioned IAM role;
    # see roleArn below) or "secret" (static AWS credentials from a Kubernetes
    # Secret).
    type: irsa
    # IAM role ARN to annotate the dataplane ServiceAccount with when
    # auth.type is "irsa" (eks.amazonaws.com/role-arn). The cluster's
    # pod-identity webhook then injects AWS_ROLE_ARN/AWS_WEB_IDENTITY_TOKEN_FILE
    # into the dataplane pod, which performs sts:AssumeRoleWithWebIdentity
    # against this role automatically - no further chart-side wiring needed.
    # This role must already exist (trust policy + Bedrock permissions
    # provisioned externally) - this chart does not create it. Required
    # when auth.type is "irsa".
    roleArn: ""
    # Secret name containing AWS credentials if auth.type is "secret"
    secretName: bedrock-secret
  # Route configuration for Bedrock
  route:
    enabled: true
    path: /bedrock
    openAiPath: /v1/chat/completions

# Postgres database for LLM cost tracking (agentgateway's request-logging DB, which
# powers its cost dashboard and Analytics UI). Provisions a plain CNPG Cluster
# directly - no Crossplane, no external-secrets dependency. CNPG generates its own
# <clusterName>-app Secret (with a combined `uri` key) since bootstrap.initdb.secret
# is left unset; a Job (separate from this values block) reads that key and wires it
# into AgentgatewayParameters.spec.rawConfig.database.url.
database:
  # Provision a CNPG Cluster for agentgateway's request-logging database.
  enabled: true
  # Cluster resource name. Defaults to "<gateway.name>-db" if unset.
  clusterName: ""
  # Number of CNPG instances (1 = no HA, single replica).
  instances: 1
  # Database (and owner role) name.
  databaseName: agentgateway
  storage:
    size: 5Gi
    # Leave empty to use the cluster's default StorageClass.
    storageClass: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

# Kubernetes Gateway resource configuration
gateway:
  enabled: true
  # Must differ from the Helm release name used for the upstream agentgateway
  # controller install (see agentgateway-helm.yaml's releaseName: agentgateway) -
  # the controller dynamically provisions a per-Gateway dataplane Deployment
  # named after this Gateway object, which collides with the controller's own
  # Helm-managed Deployment if the names match.
  name: agentgateway-gw
  className: agentgateway
  namespace: agentgateway-system
  # Service type for the dynamically-provisioned per-Gateway dataplane Service.
  # The embedded agentgateway-standalone chart defaults this to LoadBalancer;
  # override to ClusterIP unless external exposure is explicitly wanted.
  service:
    type: ClusterIP

# JWT authentication for the Gateway. Disabled by default - opt in once
# clients are ready to send tokens from the configured issuer. When enabled,
# validation is Strict: every request must carry a valid JWT.
jwt:
  enabled: false
  # IdP that issued the JWT (must match the token's `iss` claim exactly).
  issuer: ""
  # Allowed `aud` claim values. Leave empty to accept any audience.
  audiences: []
  # External issuer reached over TLS (e.g. an OIDC provider outside the
  # cluster). host/port target the issuer's JWKS endpoint; jwksPath is the
  # path component of its jwks_uri (see the issuer's
  # /.well-known/openid-configuration document).
  externalIssuer:
    host: ""
    port: 443
    jwksPath: /keys
    # SNI to present in the TLS handshake. Defaults to externalIssuer.host
    # when unset.
    sni: ""
  cacheDuration: 5m

# Admin UI internal service configuration
ui:
  # Enable internal ClusterIP Service for the read-only Admin UI (port 15000)
  enabled: true
  service:
    type: ClusterIP
    port: 15000
    targetPort: 15000

# OpenTelemetry Tracing configuration
tracing:
  # Enable OpenTelemetry tracing AgentgatewayPolicy
  enabled: false
  # OTel Collector backend reference
  backendRef:
    name: otlp-gateway
    namespace: otlp-gateway
    port: 4317
  # Tracing protocol: GRPC or HTTP
  protocol: GRPC
  # Random sampling ratio ("1.0" for 100%, "0.1" for 10%)
  randomSampling: "1.0"
  clientSampling: "true"
  resources:
    - name: deployment.environment.name
      expression: '"production"'
  attributes:
    add:
      - name: host
        expression: 'request.host'

# Upstream agentgateway controller options
controller:
  replicaCount: 1
  logLevel: info
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

# Monitoring & Prometheus metrics scraping configuration
monitoring:
  # Enable Prometheus ServiceMonitor and Grafana dashboard creation
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
  grafanaDashboard:
    enabled: true

# Data plane proxy defaults
proxy:
  logLevel: info
