controller:
  replicaCount: {{ .Values.controller.replicaCount }}
  logLevel: {{ .Values.controller.logLevel | quote }}
  resources:
    {{- toYaml .Values.controller.resources | nindent 4 }}

image:
  registry: cr.agentgateway.dev
  pullPolicy: IfNotPresent

inferenceExtension:
  enabled: true

monitoring:
  enabled: {{ .Values.monitoring.enabled }}
  serviceMonitor:
    enabled: {{ .Values.monitoring.serviceMonitor.enabled }}
    interval: {{ .Values.monitoring.serviceMonitor.interval | quote }}
  grafanaDashboard:
    enabled: {{ .Values.monitoring.grafanaDashboard.enabled }}
