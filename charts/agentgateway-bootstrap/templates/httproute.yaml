{{- if and .Values.gateway.enabled .Values.bedrock.enabled .Values.bedrock.route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bedrock-route
  namespace: {{ .Values.gateway.namespace | default "agentgateway-system" }}
  labels:
    {{- include "agentgateway-bootstrap.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.bedrock.route.path }}
        - path:
            type: PathPrefix
            value: {{ .Values.bedrock.route.openAiPath }}
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: bedrock
{{- end }}
