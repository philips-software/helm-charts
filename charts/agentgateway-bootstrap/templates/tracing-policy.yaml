{{- if and .Values.tracing.enabled .Values.gateway.enabled }}
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: {{ include "agentgateway-bootstrap.fullname" . }}-tracing
  namespace: {{ .Values.gateway.namespace | default "agentgateway-system" }}
  labels:
    {{- include "agentgateway-bootstrap.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gateway.name | default "agentgateway" }}
  frontend:
    tracing:
      backendRef:
        name: {{ .Values.tracing.backendRef.name | quote }}
        namespace: {{ .Values.tracing.backendRef.namespace | quote }}
        port: {{ .Values.tracing.backendRef.port }}
      protocol: {{ .Values.tracing.protocol | default "GRPC" | quote }}
      {{- if .Values.tracing.randomSampling }}
      randomSampling: {{ .Values.tracing.randomSampling | quote }}
      {{- end }}
      {{- if .Values.tracing.clientSampling }}
      clientSampling: {{ .Values.tracing.clientSampling | quote }}
      {{- end }}
      {{- if .Values.tracing.resources }}
      resources:
        {{- toYaml .Values.tracing.resources | nindent 8 }}
      {{- end }}
      {{- if .Values.tracing.attributes }}
      attributes:
        {{- toYaml .Values.tracing.attributes | nindent 8 }}
      {{- end }}
{{- end }}
