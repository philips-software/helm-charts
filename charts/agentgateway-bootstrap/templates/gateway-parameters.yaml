{{- if .Values.gateway.enabled }}
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: {{ .Values.gateway.name }}-params
  namespace: {{ .Values.gateway.namespace | default "agentgateway-system" }}
  labels:
    {{- include "agentgateway-bootstrap.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  service:
    spec:
      type: {{ .Values.gateway.service.type | default "ClusterIP" }}
  {{- if and .Values.bedrock.enabled (eq .Values.bedrock.auth.type "irsa") .Values.bedrock.auth.roleArn }}
  serviceAccount:
    metadata:
      annotations:
        eks.amazonaws.com/role-arn: {{ .Values.bedrock.auth.roleArn | quote }}
  {{- end }}
{{- end }}
