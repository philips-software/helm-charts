{{- include "loki-bootstrap.validateConfig" . -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-helm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "loki-bootstrap.labels" . | nindent 4 }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: {{ .Values.argoProject }}
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/replicas
  source:
    chart: loki
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: {{ .Values.lokiChart.version }}
    helm:
      releaseName: loki
      valuesObject:
        {{- (tpl (.Files.Get "config/loki-values.yaml") .) | nindent 8 }}
  destination:
    server: "https://kubernetes.default.svc"
    namespace: loki-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
