{{- if .Values.vpa.enabled }}
{{- $updateMode := .Values.vpa.updateMode | default "Auto" }}

{{- if .Values.vpa.components.patternIngester.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: loki-pattern-ingester
  namespace: loki-system
  labels:
    {{- include "loki-bootstrap.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: loki-pattern-ingester
  updatePolicy:
    updateMode: {{ $updateMode }}
  resourcePolicy:
    containerPolicies:
      - containerName: pattern-ingester
        minAllowed:
          {{- with .Values.vpa.components.patternIngester.minAllowed }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        maxAllowed:
          {{- with .Values.vpa.components.patternIngester.maxAllowed }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        controlledResources: ["memory"]
---
{{- end }}

