lokiChart:
  # renovate: datasource=helm depName=loki registryUrl=https://grafana.github.io/helm-charts
  version: 7.0.0

compactorOrgmapper:
  package: ghcr.io/loafoe/compactor-orgmapper
  # renovate: datasource=docker depName=ghcr.io/loafoe/compactor-orgmapper
  tag: v0.0.1

initOverrides:
  package: busybox
  # renovate: datasource=docker depName=busybox
  tag: 1.38.0

environmentConfig:
  resourcePrefix: ""
  region: ""
  accountId: ""

# The name of an existing S3 bucket to use for Loki storage.
# This value is required and cannot be empty.
# You can use variables like ${resourcePrefix} and ${region} which will be replaced
# with values from environmentConfig.
# Example: "my-bucket-${resourcePrefix}-loki" will become "my-bucket-prod-loki"
existingBucketName: ""

argoProject: default

multitenancyEnabled: true

# Additional resource attributes to index as labels in the OTLP config.
# These are appended to the default list (service.name, k8s.namespace.name, etc.)
extraResourceAttributesAsIndexLabels: []

# Loki configuration
loki:
  # Replication factor for ingester data (default: 2)
  # For zone-aware HA, ensure ingester.replicas >= replicationFactor * number_of_zones
  replicationFactor: 2

  # Runtime config limits (applied to all tenants via "*" override)
  limits_config:
    # Maximum number of label names per series (Loki default: 15, recommended: 10-15)
    max_label_names_per_series: 18
    # Maximum number of active streams per tenant across all ingesters (Loki default: 5000)
    max_global_streams_per_user: 5000
    # Maximum number of unique series returned by a metric query (Loki default: 500)
    max_query_series: 500
    # Maximum number of log entries returned by a query (Loki default: 5000)
    max_entries_limit_per_query: 5000

  # gRPC server configuration
  server:
    # Maximum size of gRPC messages received (bytes, default: 83886080 = 80MB)
    grpc_server_max_recv_msg_size: 83886080  # 80MB
    # Maximum size of gRPC messages sent (bytes, default: 83886080 = 80MB)
    grpc_server_max_send_msg_size: 83886080  # 80MB
    # Maximum number of concurrent gRPC streams (default: unlimited)
    grpc_server_max_concurrent_streams: 1000

  # Pattern ingester configuration for gRPC
  pattern_ingester:
    enabled: true
    client_config:
      grpc_client_config:
        # Maximum size of gRPC messages received by pattern ingester client
        max_recv_msg_size: 83886080  # 80MB
        # Maximum size of gRPC messages sent by pattern ingester client
        max_send_msg_size: 83886080  # 80MB

# Ingester configuration
ingester:
  # Number of ingester replicas
  # For zone-aware HA with 3 AZs, use at least replicationFactor * 3
  replicas: 3
  resources:
    requests:
      # CPU request: Increase from default 120m due to heavy compression work
      # (269MB → 1.2MB). Under load, ingesters need significant CPU resources
      cpu: 500m
      memory: 8Gi
    limits:
      memory: 10Gi

# Pattern Ingester configuration
patternIngester:
  # Number of pattern ingester replicas
  replicas: 3
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      memory: 1Gi
  extraArgs:
    # Maximum size of gRPC messages received by pattern ingester (bytes, default: 134217728 = 128MB)
    grpc_max_recv_msg_size: 83886080  # 80MB
    # Maximum size of gRPC messages sent by pattern ingester (bytes, default: 134217728 = 128MB)
    grpc_max_send_msg_size: 83886080  # 80MB

# Gateway configuration
gateway:
  replicas: 3
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# Distributor configuration
distributor:
  replicas: 3
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      memory: 2Gi

features:
  # Enable the CloudWatch kill job that removes CloudWatch ClusterOutputs
  # and ensures a null-output ClusterOutput exists
  cloudwatchKillJob: false

# Vertical Pod Autoscaler configuration
# Requires VPA to be installed in the cluster
vpa:
  # Enable VPA resources for Loki components
  enabled: false
  # Update mode: Off, Initial, InPlaceOrRecreate
  # - InPlaceOrRecreate: VPA will resize in-place if possible, otherwise recreate
  # - Initial: VPA only sets resources at pod creation
  # - Off: VPA only provides recommendations
  updateMode: InPlaceOrRecreate
  # Components to create VPA resources for
  components:
    patternIngester:
      enabled: true
      minAllowed:
        memory: 512Mi
      maxAllowed:
        memory: 4Gi
    ingester:
      enabled: true
      minAllowed:
        memory: 8Gi
      maxAllowed:
        memory: 16Gi
    distributor:
      enabled: true
      minAllowed:
        memory: 1Gi
      maxAllowed:
        memory: 4Gi
    querier:
      enabled: true
      minAllowed:
        memory: 150Mi
      maxAllowed:
        memory: 8Gi
    indexGateway:
      enabled: true
      minAllowed:
        memory: 128Mi
      maxAllowed:
        memory: 1Gi
    gateway:
      enabled: true
      minAllowed:
        memory: 64Mi
      maxAllowed:
        memory: 256Mi
