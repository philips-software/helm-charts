# Default values for centcom-satellite

replicaCount: 1

image:
  repository: ghcr.io/loafoe/centcom-satellite
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# SPIRE/SPIFFE configuration for workload identity
spire:
  # Enable SPIRE authentication (required for both mTLS and JWT modes)
  enabled: true
  # SPIRE controller manager className (must match your SPIRE installation)
  # Common values: "spire-release-spire", "spire-system-spire"
  className: "spire-release-spire"
  # SPIRE agent socket path (env var passed to the application)
  agentSocket: "unix:///spiffe-workload-api/spire-agent.sock"
  # Mount path for the SPIRE socket inside the container
  socketMountPath: "/spiffe-workload-api"
  # Host path for SPIRE socket (used when csi.enabled=false)
  hostSocketPath: "/run/spire/agent-sockets"
  # CSI driver configuration (recommended for clusters with spiffe-csi-driver)
  csi:
    enabled: true
  # Trust domains to accept (supports federation with multiple domains)
  # Example: ["example.org", "partner.com"]
  trustDomains: []
  # Skip creating the federated ClusterSPIFFEID (use when ALL callers are in the
  # same trust domain as this agent — federation with self is invalid)
  skipFederation: false
  # The agent's OWN trust domain. When a caller lives in the same trust domain
  # as this agent, list that domain in trustDomains (so it's accepted) AND set
  # it here, so the federated ClusterSPIFFEID excludes it from federatesWith
  # (SPIRE cannot federate a trust domain with itself). Leave empty when every
  # caller is remote. This lets you trust a LOCAL caller and REMOTE callers at
  # the same time, without disabling federation entirely (skipFederation).
  # Example: "rpi.loafoe.com"
  localTrustDomain: ""
  # Legacy single trust domain (use trustDomains for new deployments)
  # Kept for backward compatibility
  trustDomain: ""
  # List of allowed SPIFFE IDs (empty = allow all from configured trust domains)
  # Example: ["spiffe://example.org/ai-agent", "spiffe://partner.com/service"]
  allowedSPIFFEIDs: []
  # Enable X.509 mTLS (requires direct pod-to-pod communication)
  # When false, only JWT-SVID authentication is used (works behind gateways)
  mtlsEnabled: false
  # JWT-SVID authentication (works behind TLS-terminating gateways)
  jwt:
    # Enable JWT-SVID validation
    enabled: false
    # Expected JWT audiences (at least one required when jwt.enabled=true)
    # Example: ["centcom-satellite", "https://centcom-satellite.example.org"]
    audiences: []

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use
  name: ""

# RBAC configuration
rbac:
  # Create ClusterRole and ClusterRoleBinding
  create: true
  # Additional RBAC rules to add to the ClusterRole
  # Example:
  # additionalRules:
  #   - apiGroups: ["custom.example.com"]
  #     resources: ["myresources"]
  #     verbs: ["get", "list", "watch"]
  additionalRules: []

# Feature flags for optional functionality
features:
  # Enable get_resource task for fetching arbitrary Kubernetes resources
  # When enabled, also grants wildcard read RBAC permissions
  # Note: Secret access is blocked in code for security
  getResource: false
  # Enable workload_restart task for rolling restarts of deployments/statefulsets/daemonsets
  # When enabled, grants patch permission on apps workloads and read on PDBs
  workloadRestart: false
  # Enable workload_scale task for scaling deployments/statefulsets
  # When enabled, grants scale subresource access and read on HPAs
  workloadScale: false
  # Enable pod_evict task for evicting/deleting pods
  # When enabled, grants eviction create, pod delete, and read on PDBs
  podEvict: false
  # Enable pod_resize task for in-place pod memory resize (KEP-1287)
  # Requires Kubernetes 1.27+ with InPlacePodVerticalScaling feature gate
  podResize: false
  # Pod resize safety limits
  podResizePercentageCap: 50
  podResizeAbsoluteCap: "4Gi"
  # Enable nodeclaim_delete task for Karpenter node management
  # When enabled, grants get/delete on karpenter.sh nodeclaims
  nodeclaimDelete: false
  # Enable Argo CD application introspection
  # When enabled, grants get/list/watch on argoproj.io applications
  argocd: false
  # Enable list_configmaps + get_configmap tasks for ConfigMap introspection
  # When enabled, grants get/list on configmaps. get_configmap redacts
  # secret-looking values (high-entropy/PEM/inline-secret/secret-key-name).
  configmapRead: false
  # Enable http_request task for making HTTP requests to cluster-internal services
  # Useful for admin endpoints, ring management, config reloads, debugging
  # Only allows requests to cluster-internal addresses (pods, services)
  httpRequest: false
  # Enable pv_resize task for resizing persistent volumes
  # When enabled, grants patch permission on PVCs
  pvResize: false
  # Enable auto-remediation workflows orchestrated by centcom
  # (e.g. PV usage alerting and automatic resize). Sets AUTO_REMEDIATE_ENABLED.
  autoRemediate: false
  # Enable CloudWatch RCA tasks (7 tasks: describe/list/tag APIs for alarms,
  # metrics, log groups, Cost Explorer). Sets CLOUDWATCH_RCA_ENABLED. Requires
  # AWS credentials via IRSA (aws.irsa) or ambient credentials.
  cloudwatchRca: false
  # Enable GuardDuty tasks (5 tasks: list detectors, findings statistics, list/get
  # findings, and a list+hydrate composite). Sets GUARDDUTY_ENABLED. Independently
  # toggleable from cloudwatchRca. Requires AWS credentials via IRSA (aws.irsa) or
  # ambient credentials; attaches the read-only GuardDuty policy to the IRSA role.
  guardduty: false

# AWS integration: Crossplane-managed IAM + IRSA.
#
# When enabled, the chart provisions a single GENERIC IAM role for the agent's
# ServiceAccount and attaches one policy per enabled task-group: the CloudWatch RCA
# policy (attached only when features.cloudwatchRca is true) and the read-only
# GuardDuty policy (attached only when features.guardduty is true). Additional task
# groups add their own policies to the same role rather than a new role.
aws:
  irsa:
    # Create Crossplane IAM Role (+ per-feature Policy/Attachment) and annotate the SA for IRSA
    enabled: false
    # Prefix for the AWS-facing IAM resource names (Role, Policy). Unlike a
    # Kubernetes object name, an IAM role/policy name is GLOBAL PER AWS ACCOUNT:
    # two clusters that share one account and both install this chart would
    # otherwise collide on the identical role/policy name (and role ARN). Set
    # this to something cluster-unique to disambiguate them — install.sh seeds
    # it from the cluster's environment tag (hsp-addons EnvironmentConfig).
    # Empty == no prefix (role/policy named after the release), preserving the
    # behaviour of installs that predate this option.
    namePrefix: ""
    # AWS account ID (used to compute the role ARN stamped on the ServiceAccount)
    accountId: ""
    # Cluster OIDC issuer host (no scheme), e.g. k3s-issuer.dip-ce-k3s-eu.hsp.philips.com
    oidcIssuer: ""
    # Token audience expected in the IRSA trust policy
    audience: "sts.amazonaws.com"
    # Crossplane ClusterProviderConfig name
    providerConfigRef: default
    # AWS region the SDK uses for CloudWatch/Logs calls (Cost Explorer is us-east-1 in code)
    region: ""
    # IAM path and extra tags applied to the created role/policies
    path: /
    tags: {}
    # Bring-your-own role: when set, skip building the ARN from accountId and just
    # annotate the SA with this ARN (Crossplane resources still render if enabled).
    roleArnOverride: ""
    # Additional pre-existing managed-policy ARNs to attach to the generic role.
    # Use this to grant IAM for task groups beyond the built-in CloudWatch RCA
    # policy without defining a new role, e.g.:
    #   extraPolicyArns:
    #     - arn:aws:iam::123456789012:policy/centcom-satellite-extra
    extraPolicyArns: []

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  metricsPort: 9090

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 32Mi

# Observability settings
#
# Distributed tracing: centcom-satellite participates in traces that originate in
# centcom (the caller) using W3C Trace Context. Trace context propagation is
# ALWAYS ON — the inbound traceparent is honoured and re-injected into outbound
# Kubernetes API calls regardless of whether spans are exported. Setting
# otelEndpoint additionally exports spans to an OTLP collector. Sampling
# decisions made upstream by centcom are honoured (ParentBased sampler).
observability:
  logLevel: info
  logFormat: json
  # OpenTelemetry OTLP collector endpoint for span export (host:port). When
  # empty, spans are not exported but trace context is still propagated.
  otelEndpoint: ""
  # Use plaintext (insecure) for the OTLP exporter. Set to false to use TLS.
  # Maps to OTEL_EXPORTER_OTLP_INSECURE. Only applies when otelEndpoint is set.
  otelInsecure: true
  otelServiceName: centcom-satellite

# Prometheus ServiceMonitor (requires the Prometheus Operator CRDs).
# Scrapes the metrics port (9090) at /metrics. The centcom-satellite exposes:
#   centcom_satellite_http_* / tasks_* / auth_attempts_total / k8s_requests_* /
#   log_stream_* / build_info, plus Go runtime + process collectors.
serviceMonitor:
  # Enable creation of a ServiceMonitor resource
  enabled: false
  # Namespace for the ServiceMonitor (defaults to the release namespace).
  # Set this when your Prometheus watches a specific namespace.
  namespace: ""
  # Scrape interval and per-scrape timeout
  interval: 30s
  scrapeTimeout: 10s
  # Extra labels on the ServiceMonitor. Often required so the Prometheus
  # Operator's serviceMonitorSelector picks it up, e.g. {release: kube-prometheus-stack}
  labels: {}
  # Keep metric labels from the target instead of overwriting on conflict
  honorLabels: false
  # Service labels to copy onto scraped metrics as target labels
  targetLabels: []
  # Prometheus relabeling applied before scraping (relabel_configs)
  relabelings: []
  # Prometheus relabeling applied to scraped samples (metric_relabel_configs)
  metricRelabelings: []

nodeSelector:
  kubernetes.io/os: linux

tolerations: []

affinity: {}

# Vertical Pod Autoscaler
vpa:
  enabled: true
  updateMode: InPlaceOrRecreate
  # Enable in-place resize (requires K8s 1.27+ with InPlacePodVerticalScaling feature gate)
  inPlaceResize: false
  minReplicas: 1
  minAllowed:
    cpu: 5m
    memory: 16Mi
  maxAllowed:
    cpu: 500m
    memory: 1Gi

# HTTPRoute configuration for Gateway API
httpRoute:
  # Enable HTTPRoute for external access
  enabled: false
  # Hostname for the route
  hostname: ""
  # Gateway reference
  gatewayRef:
    name: platform
    namespace: kube-system
    # Use http listener when TLS is terminated at the load balancer
    sectionName: http-0
  # Optional annotations
  annotations: {}

