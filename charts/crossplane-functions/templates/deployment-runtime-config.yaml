{{- if .Values.features.deploymentRuntimeConfig }}
{{- range concat .Values.functions .Values.extraFunctions }}
---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: {{ .name }}
spec:
  deploymentTemplate:
    metadata:
      name: {{ .name }}
    spec:
      selector: {}
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: package-runtime
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              resources:
                {{- .resources | default $.Values.resources | toYaml | nindent 16 }}
          {{- if .critical }}
          {{- with $.Values.criticalFunctions.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $.Values.criticalFunctions.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
{{- end }}
{{- end }}