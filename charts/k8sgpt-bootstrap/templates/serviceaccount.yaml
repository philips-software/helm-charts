{{- if .Values.irsa.enabled }}
# ServiceAccount for k8sgpt deployment with IRSA annotation
# This SA is created with sync-wave 1 so it exists before the k8sgpt-operator
# creates the K8sGPT deployment (sync-wave 2). The operator will reuse this SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.irsa.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "k8sgpt-bootstrap.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    eks.amazonaws.com/role-arn: {{ include "k8sgpt-bootstrap.irsaRoleArn" . }}
{{- end }}
