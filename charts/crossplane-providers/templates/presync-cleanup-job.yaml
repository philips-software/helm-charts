{{- $allProviders := concat .Values.providers .Values.extraProviders }}
{{- $enabledProviders := list }}
{{- range $allProviders }}
{{- if not (eq (.enabled | toString) "false") }}
{{- $enabledProviders = append $enabledProviders .name }}
{{- end }}
{{- end }}
{{- if $enabledProviders }}
apiVersion: batch/v1
kind: Job
metadata:
  name: crossplane-provider-cleanup
  namespace: {{ .Values.package.namespace }}
  labels:
    {{- include "crossplane-providers.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crossplane-provider-cleanup
    spec:
      restartPolicy: Never
      serviceAccountName: crossplane-provider-cleanup
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cleanup
          image: bitnami/kubectl:1.31
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
          command:
            - /bin/sh
            - -c
            - |
              set -e
              PROVIDERS="{{ join " " $enabledProviders }}"

              for PROVIDER in $PROVIDERS; do
                echo "Checking provider: $PROVIDER"

                # Find ProviderRevisions stuck in Deleting
                STUCK_REVISIONS=$(kubectl get providerrevisions -l pkg.crossplane.io/package=$PROVIDER \
                  -o jsonpath='{range .items[?(@.metadata.deletionTimestamp)]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)

                if [ -n "$STUCK_REVISIONS" ]; then
                  for REV in $STUCK_REVISIONS; do
                    echo "Removing finalizers from stuck ProviderRevision: $REV"
                    kubectl patch providerrevision "$REV" --type=merge -p '{"metadata":{"finalizers":null}}'
                  done
                fi

                # Find CRDs with stale ownerReferences to deleted ProviderRevisions
                CRDS=$(kubectl get crd -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{range .metadata.ownerReferences[*]}{.kind}{":"}{.name}{":"}{.uid}{"\n"}{end}{end}' 2>/dev/null \
                  | grep "ProviderRevision:$PROVIDER" || true)

                if [ -n "$CRDS" ]; then
                  # Get currently-existing revision names for this provider
                  EXISTING_REVS=$(kubectl get providerrevisions -l pkg.crossplane.io/package=$PROVIDER \
                    -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)

                  echo "$CRDS" | while IFS=$'\t' read -r CRD_NAME OWNER_INFO; do
                    REV_NAME=$(echo "$OWNER_INFO" | cut -d: -f2)
                    if ! echo "$EXISTING_REVS" | grep -qx "$REV_NAME"; then
                      echo "Removing stale ownerReference from CRD: $CRD_NAME (was owned by $REV_NAME)"
                      kubectl patch crd "$CRD_NAME" --type=json \
                        -p="[{\"op\":\"remove\",\"path\":\"/metadata/ownerReferences\"}]" 2>/dev/null || true
                    fi
                  done
                fi
              done

              echo "Cleanup complete"
{{- end }}
