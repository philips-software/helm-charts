{{- $allProviders := concat .Values.providers .Values.extraProviders }}
{{- $hasEnabled := false }}
{{- range $allProviders }}
{{- if not (eq (.enabled | toString) "false") }}
{{- $hasEnabled = true }}
{{- end }}
{{- end }}
{{- if $hasEnabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "crossplane-providers.cleanupName" . }}
  namespace: {{ .Values.package.namespace }}
  labels:
    {{- include "crossplane-providers.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "crossplane-providers.cleanupName" . }}
  labels:
    {{- include "crossplane-providers.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: ["pkg.crossplane.io"]
    resources: ["providerrevisions"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "crossplane-providers.cleanupName" . }}
  labels:
    {{- include "crossplane-providers.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "crossplane-providers.cleanupName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "crossplane-providers.cleanupName" . }}
    namespace: {{ .Values.package.namespace }}
{{- end }}
