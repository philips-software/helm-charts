{{- if or .Values.loadbalancer.enabled .Values.ingress.enabled }}
{{/*
Validation: Ensure an FQDN is available for TLS certificates (either clusterFqdn or customFqdn)
*/}}
{{- if not (or .Values.environmentConfig.clusterFqdn (and .Values.useCustomFqdn .Values.environmentConfig.customFqdn)) }}
{{- fail "ERROR: Either environmentConfig.clusterFqdn or environmentConfig.customFqdn (with useCustomFqdn: true) must be provided for TLS certificate generation." }}
{{- end }}

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: otlp-gateway-tls
  namespace: {{ include "otlp-gateway.namespace" . }}
spec:
  secretName: otlp-gateway-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - {{ include "otlp-gateway.fqdn" . }}
{{- end }}