tempoChart:
  # renovate: datasource=helm depName=tempo-distributed registryUrl=https://grafana.github.io/helm-charts
  version: 2.6.0

compactorOrgmapper:
  package: ghcr.io/loafoe/compactor-orgmapper
  # renovate: datasource=docker depName=ghcr.io/loafoe/compactor-orgmapper
  tag: v0.0.1

initOverrides:
  package: busybox
  # renovate: datasource=docker depName=busybox
  tag: 1.36.1

environmentConfig:
  resourcePrefix: ""
  region: ""
  accountId: ""

# The name of an existing S3 bucket to use for Tempo storage.
# This value is required and cannot be empty.
# You can use variables like ${resourcePrefix} and ${region} which will be replaced
# with values from environmentConfig.
# Example: "my-bucket-${resourcePrefix}-tempo" will become "my-bucket-prod-tempo"
existingBucketName: ""

argoProject: default

multitenancyEnabled: true
