apiVersion: dip.io/v1alpha1
kind: S3IRSA
metadata:
  name: {{ .Values.environmentConfig.resourcePrefix }}-tempo-s3
  namespace: tempo-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  existingBucketName: {{ include "tempo-bootstrap.substituteVars" (dict "str" .Values.existingBucketName "ctx" .) }}
  permissions:
    allowRead: true
    allowWrite: true
  serviceAccount:
    name: {{ .Values.environmentConfig.resourcePrefix }}-tempo-s3
  writeConnectionSecretToRef:
    name: {{ .Values.environmentConfig.resourcePrefix }}-tempo-s3
