apiVersion: "autoscaling.k8s.io/v1"
kind: VerticalPodAutoscaler
metadata:
  name: tempo-ingester-vpa
  namespace: tempo-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: StatefulSet
    name: tempo-ingester
  updatePolicy:
    minReplicas: 3
    updateMode: Auto
  resourcePolicy:
    containerPolicies:
      - containerName: '*'
        minAllowed:
          cpu: 100m
          memory: 800Mi
        maxAllowed:
          cpu: 1
          memory: 8Gi
        controlledResources: ["memory", "cpu"]