{{- include "tempo-bootstrap.validateConfig" . -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo-helm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tempo-bootstrap.labels" . | nindent 4 }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: {{ .Values.argoProject }}
  source:
    chart: tempo-distributed
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: {{ .Values.tempoChart.version }}
    helm:
      releaseName: tempo
      valuesObject:
        {{- (tpl (.Files.Get "config/tempo-values.yaml") .) | nindent 8 }}
  destination:
    server: "https://kubernetes.default.svc"
    namespace: tempo-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
