# Default values for pico-agent

replicaCount: 1

image:
  repository: ghcr.io/loafoe/pico-agent
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# SPIRE/SPIFFE configuration for workload identity
spire:
  # Enable SPIRE authentication (required for both mTLS and JWT modes)
  enabled: true
  # SPIRE controller manager className (must match your SPIRE installation)
  # Common values: "spire-release-spire", "spire-system-spire"
  className: "spire-release-spire"
  # SPIRE agent socket path (env var passed to the application)
  agentSocket: "unix:///spiffe-workload-api/spire-agent.sock"
  # Mount path for the SPIRE socket inside the container
  socketMountPath: "/spiffe-workload-api"
  # Host path for SPIRE socket (used when csi.enabled=false)
  hostSocketPath: "/run/spire/agent-sockets"
  # CSI driver configuration (recommended for clusters with spiffe-csi-driver)
  csi:
    enabled: true
  # Trust domains to accept (supports federation with multiple domains)
  # Example: ["example.org", "partner.com"]
  trustDomains: []
  # Legacy single trust domain (use trustDomains for new deployments)
  # Kept for backward compatibility
  trustDomain: ""
  # List of allowed SPIFFE IDs (empty = allow all from configured trust domains)
  # Example: ["spiffe://example.org/ai-agent", "spiffe://partner.com/service"]
  allowedSPIFFEIDs: []
  # Enable X.509 mTLS (requires direct pod-to-pod communication)
  # When false, only JWT-SVID authentication is used (works behind gateways)
  mtlsEnabled: false
  # JWT-SVID authentication (works behind TLS-terminating gateways)
  jwt:
    # Enable JWT-SVID validation
    enabled: false
    # Expected JWT audiences (at least one required when jwt.enabled=true)
    # Example: ["pico-agent", "https://pico-agent.example.org"]
    audiences: []

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use
  name: ""

# RBAC configuration
rbac:
  # Create ClusterRole and ClusterRoleBinding
  create: true
  # Additional RBAC rules to add to the ClusterRole
  # Example:
  # additionalRules:
  #   - apiGroups: ["custom.example.com"]
  #     resources: ["myresources"]
  #     verbs: ["get", "list", "watch"]
  additionalRules: []

# Feature flags for optional functionality
features:
  # Enable get_resource task for fetching arbitrary Kubernetes resources
  # When enabled, also grants wildcard read RBAC permissions
  # Note: Secret access is blocked in code for security
  getResource: false
  # Enable workload_restart task for rolling restarts of deployments/statefulsets/daemonsets
  # When enabled, grants patch permission on apps workloads and read on PDBs
  workloadRestart: false
  # Enable workload_scale task for scaling deployments/statefulsets
  # When enabled, grants scale subresource access and read on HPAs
  workloadScale: false
  # Enable pod_evict task for evicting/deleting pods
  # When enabled, grants eviction create, pod delete, and read on PDBs
  podEvict: false
  # Enable pod_resize task for in-place pod memory resize (KEP-1287)
  # Requires Kubernetes 1.27+ with InPlacePodVerticalScaling feature gate
  podResize: false
  # Pod resize safety limits
  podResizePercentageCap: 50
  podResizeAbsoluteCap: "4Gi"
  # Enable nodeclaim_delete task for Karpenter node management
  # When enabled, grants get/delete on karpenter.sh nodeclaims
  nodeclaimDelete: false
  # Enable Argo CD application introspection
  # When enabled, grants get/list/watch on argoproj.io applications
  argocd: false
  # Enable list_configmaps + get_configmap tasks for ConfigMap introspection
  # When enabled, grants get/list on configmaps. get_configmap redacts
  # secret-looking values (high-entropy/PEM/inline-secret/secret-key-name).
  configmapRead: false
  # Enable http_request task for making HTTP requests to cluster-internal services
  # Useful for admin endpoints, ring management, config reloads, debugging
  # Only allows requests to cluster-internal addresses (pods, services)
  httpRequest: false
  # Enable pv_resize task for resizing persistent volumes
  # When enabled, grants patch permission on PVCs
  pvResize: false
  # Enable auto-remediation workflows orchestrated by pico-mcp
  # (e.g. PV usage alerting and automatic resize). Sets AUTO_REMEDIATE_ENABLED.
  autoRemediate: false

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  metricsPort: 9090

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 32Mi

# Observability settings
#
# Distributed tracing: pico-agent participates in traces that originate in
# pico-mcp (the caller) using W3C Trace Context. Trace context propagation is
# ALWAYS ON — the inbound traceparent is honoured and re-injected into outbound
# Kubernetes API calls regardless of whether spans are exported. Setting
# otelEndpoint additionally exports spans to an OTLP collector. Sampling
# decisions made upstream by pico-mcp are honoured (ParentBased sampler).
observability:
  logLevel: info
  logFormat: json
  # OpenTelemetry OTLP collector endpoint for span export (host:port). When
  # empty, spans are not exported but trace context is still propagated.
  otelEndpoint: ""
  # Use plaintext (insecure) for the OTLP exporter. Set to false to use TLS.
  # Maps to OTEL_EXPORTER_OTLP_INSECURE. Only applies when otelEndpoint is set.
  otelInsecure: true
  otelServiceName: pico-agent

# Prometheus ServiceMonitor (requires the Prometheus Operator CRDs).
# Scrapes the metrics port (9090) at /metrics. The pico-agent exposes:
#   pico_agent_http_* / tasks_* / auth_attempts_total / k8s_requests_* /
#   log_stream_* / build_info, plus Go runtime + process collectors.
serviceMonitor:
  # Enable creation of a ServiceMonitor resource
  enabled: false
  # Namespace for the ServiceMonitor (defaults to the release namespace).
  # Set this when your Prometheus watches a specific namespace.
  namespace: ""
  # Scrape interval and per-scrape timeout
  interval: 30s
  scrapeTimeout: 10s
  # Extra labels on the ServiceMonitor. Often required so the Prometheus
  # Operator's serviceMonitorSelector picks it up, e.g. {release: kube-prometheus-stack}
  labels: {}
  # Keep metric labels from the target instead of overwriting on conflict
  honorLabels: false
  # Service labels to copy onto scraped metrics as target labels
  targetLabels: []
  # Prometheus relabeling applied before scraping (relabel_configs)
  relabelings: []
  # Prometheus relabeling applied to scraped samples (metric_relabel_configs)
  metricRelabelings: []

nodeSelector:
  kubernetes.io/os: linux

tolerations: []

affinity: {}

# Vertical Pod Autoscaler
vpa:
  enabled: false
  updateMode: InPlaceOrRecreate
  # Enable in-place resize (requires K8s 1.27+ with InPlacePodVerticalScaling feature gate)
  inPlaceResize: false
  minReplicas: 1
  minAllowed:
    cpu: 5m
    memory: 16Mi
  maxAllowed:
    cpu: 500m
    memory: 1Gi

# HTTPRoute configuration for Gateway API
httpRoute:
  # Enable HTTPRoute for external access
  enabled: false
  # Hostname for the route
  hostname: ""
  # Gateway reference
  gatewayRef:
    name: platform
    namespace: kube-system
    # Use http listener when TLS is terminated at the load balancer
    sectionName: http-0
  # Optional annotations
  annotations: {}

