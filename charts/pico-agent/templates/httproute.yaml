{{- if and .Values.httpRoute .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "pico-agent.fullname" . }}
  labels:
    {{- include "pico-agent.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.gatewayRef.name }}
      namespace: {{ .Values.httpRoute.gatewayRef.namespace }}
      {{- if .Values.httpRoute.gatewayRef.sectionName }}
      sectionName: {{ .Values.httpRoute.gatewayRef.sectionName }}
      {{- end }}
  hostnames:
    - {{ .Values.httpRoute.hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "pico-agent.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
