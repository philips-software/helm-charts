{{- if .Values.customAlloy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-custom-alloy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: custom-alloy
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  config.alloy: |
    {{- $otlpDest := index .Values.otlp.destinations 0 }}
    // Kube State Metrics Discovery
    discovery.kubernetes "kube_state_metrics" {
      role = "endpoints"
      selectors {
        role = "endpoints"
        label = "app.kubernetes.io/name=kube-state-metrics"
      }
    }

    discovery.relabel "kube_state_metrics" {
      targets = discovery.kubernetes.kube_state_metrics.targets

      rule {
        source_labels = ["__meta_kubernetes_endpoint_port_name"]
        regex = "http"
        action = "keep"
      }

      // Only set instance label for scrape target identification
      // Do NOT set namespace/service/pod labels here as they would overwrite
      // the actual resource labels provided by kube-state-metrics
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label = "instance"
      }
    }

    prometheus.scrape "kube_state_metrics" {
      targets = discovery.relabel.kube_state_metrics.output
      job_name = "integrations/kubernetes/kube-state-metrics"
      scrape_interval = "60s"
      scrape_timeout = "10s"
      scheme = "http"

      {{- if .Values.customAlloy.clustering.enabled }}
      clustering {
        enabled = true
      }
      {{- end }}

      forward_to = [prometheus.relabel.kube_state_metrics.receiver]
    }

    prometheus.relabel "kube_state_metrics" {
      max_cache_size = 100000
      {{- if .Values.customAlloy.kubeStateMetrics.extraMetricProcessingRules }}
      {{ .Values.customAlloy.kubeStateMetrics.extraMetricProcessingRules | nindent 6 }}
      {{- end }}
      forward_to = [otelcol.receiver.prometheus.default.receiver]
    }

    // OTEL Pipeline
    otelcol.receiver.prometheus "default" {
      output {
        metrics = [otelcol.processor.transform.default.input]
      }
    }

    otelcol.processor.transform "default" {
      error_mode = "ignore"
      metric_statements {
        context = "resource"
        statements = [
          `set(attributes["cluster"], "{{ .Values.clusterName }}")`,
          `set(attributes["k8s.cluster.name"], "{{ .Values.clusterName }}")`,
          {{- if .Values.customAlloy.attributeCleanup.enabled }}
          // Attribute cleanup - remove high-cardinality attributes (matches k8s-monitoring)
          `delete_key(attributes, "process.pid")`,
          `delete_key(attributes, "process.parent_pid")`,
          `delete_key(attributes, "process.executable.path")`,
          `delete_key(attributes, "process.command_line")`,
          `delete_key(attributes, "process.command_args")`,
          `delete_key(attributes, "process.owner")`,
          `delete_key(attributes, "process.runtime.version")`,
          `delete_key(attributes, "process.runtime.description")`,
          `delete_key(attributes, "host.ip")`,
          `delete_key(attributes, "host.mac")`,
          `delete_key(attributes, "k8s.pod.start_time")`,
          `delete_key(attributes, "k8s.pod.uid")`,
          `delete_key(attributes, "container.image.id")`,
          `delete_key(attributes, "container.image.repo_digests")`,
          `delete_key(attributes, "os.description")`,
          `delete_key(attributes, "os.build_id")`,
          {{- end }}
        ]
      }
      metric_statements {
        context = "datapoint"
        statements = [
          `set(attributes["cluster"], "{{ .Values.clusterName }}")`,
          `set(attributes["k8s.cluster.name"], "{{ .Values.clusterName }}")`,
          {{- if .Values.customAlloy.attributePromotion.enabled }}
          // Attribute promotion - move useful attributes from datapoint to resource level
          `set(resource.attributes["deployment.environment"], attributes["deployment_environment"]) where resource.attributes["deployment.environment"] == nil and attributes["deployment_environment"] != nil`,
          `delete_key(attributes, "deployment_environment") where attributes["deployment_environment"] == resource.attributes["deployment.environment"]`,
          `set(resource.attributes["deployment.environment.name"], attributes["deployment_environment_name"]) where resource.attributes["deployment.environment.name"] == nil and attributes["deployment_environment_name"] != nil`,
          `delete_key(attributes, "deployment_environment_name") where attributes["deployment_environment_name"] == resource.attributes["deployment.environment.name"]`,
          `set(resource.attributes["service.name"], attributes["service_name"]) where resource.attributes["service.name"] == nil and attributes["service_name"] != nil`,
          `delete_key(attributes, "service_name") where attributes["service_name"] == resource.attributes["service.name"]`,
          `set(resource.attributes["service.namespace"], attributes["service_namespace"]) where resource.attributes["service.namespace"] == nil and attributes["service_namespace"] != nil`,
          `delete_key(attributes, "service_namespace") where attributes["service_namespace"] == resource.attributes["service.namespace"]`,
          {{- end }}
        ]
      }
      output {
        metrics = [otelcol.processor.batch.default.input]
      }
    }

    otelcol.processor.batch "default" {
      timeout = "2s"
      send_batch_size = {{ default 2000 $otlpDest.processors.batch.size }}
      send_batch_max_size = {{ default 4000 $otlpDest.processors.batch.maxSize }}
      output {
        metrics = [otelcol.exporter.otlphttp.default.input]
      }
    }

    otelcol.auth.basic "default" {
      username = convert.nonsensitive(remote.kubernetes.secret.otlp_creds.data["username"])
      password = remote.kubernetes.secret.otlp_creds.data["apiKey"]
    }

    remote.kubernetes.secret "otlp_creds" {
      name      = "{{ $otlpDest.secret.name }}"
      namespace = "{{ default .Release.Namespace $otlpDest.secret.namespace }}"
    }

    otelcol.exporter.otlphttp "default" {
      client {
        endpoint = "{{ $otlpDest.url }}"
        auth = otelcol.auth.basic.default.handler
        headers = {
          "X-Scope-OrgID" = convert.nonsensitive(remote.kubernetes.secret.otlp_creds.data["tenantId"]),
        }
        tls {
          insecure = false
          insecure_skip_verify = false
        }
      }
      retry_on_failure {
        enabled = true
        initial_interval = "5s"
        max_interval = "30s"
        max_elapsed_time = "5m"
      }
      {{- if .Values.customAlloy.sendingQueue.enabled }}
      sending_queue {
        enabled = true
      }
      {{- end }}
    }

    logging {
      level = "info"
    }

    {{- if .Values.customAlloy.liveDebugging.enabled }}
    livedebugging {
      enabled = true
    }
    {{- end }}
{{- end }}
