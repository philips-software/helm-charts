{{- if .Values.customAlloy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-custom-alloy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: custom-alloy
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  config.alloy: |
    {{- if and .Values.customAlloy.replaceUpstreamCollector .Values.features.prometheusOperatorObjects }}
    // Prometheus Operator ServiceMonitors Discovery
    prometheus.operator.servicemonitors "service_monitors" {
      {{- if .Values.customAlloy.clustering.enabled }}
      clustering {
        enabled = true
      }
      {{- end }}

      // Exclude kube-state-metrics as it's handled separately below
      selector {
        match_expression {
          key = "app.kubernetes.io/name"
          operator = "NotIn"
          values = ["kube-state-metrics"]
        }
      }

      {{- /* Collect user-defined label expressions */ -}}
      {{- if and .Values.prometheusOperatorObjects .Values.prometheusOperatorObjects.serviceMonitors .Values.prometheusOperatorObjects.serviceMonitors.labelExpressions }}
      {{- range .Values.prometheusOperatorObjects.serviceMonitors.labelExpressions }}
      selector {
        match_expression {
          key = "{{ .key }}"
          operator = "{{ .operator }}"
          values = [{{ range $i, $v := .values }}{{ if $i }}, {{ end }}"{{ $v }}"{{ end }}]
        }
      }
      {{- end }}
      {{- end }}

      forward_to = [prometheus.relabel.service_monitors.receiver]
    }

    prometheus.relabel "service_monitors" {
      max_cache_size = 100000
      {{- $dropHighCardinality := and .Values.prometheusOperatorObjects .Values.prometheusOperatorObjects.serviceMonitors .Values.prometheusOperatorObjects.serviceMonitors.dropHighCardinalityMetrics }}
      {{- if and $dropHighCardinality .Values.prometheusOperatorObjects.serviceMonitors.dropHighCardinalityMetrics.apiserverRequestDurationBuckets }}
      // Drop apiserver_request_duration_seconds_bucket to reduce cardinality (~200K series)
      rule {
        source_labels = ["__name__"]
        regex = "apiserver_request_duration_seconds_bucket"
        action = "drop"
      }
      {{- end }}
      {{- if and $dropHighCardinality .Values.prometheusOperatorObjects.serviceMonitors.dropHighCardinalityMetrics.etcdRequestDurationBuckets }}
      // Drop etcd_request_duration_seconds_bucket to reduce cardinality (~150K series)
      rule {
        source_labels = ["__name__"]
        regex = "etcd_request_duration_seconds_bucket"
        action = "drop"
      }
      {{- end }}
      {{- if and $dropHighCardinality .Values.prometheusOperatorObjects.serviceMonitors.dropHighCardinalityMetrics.apiserverRequestSliDurationBuckets }}
      // Drop apiserver_request_sli_duration_seconds_bucket to reduce cardinality (~145K series)
      rule {
        source_labels = ["__name__"]
        regex = "apiserver_request_sli_duration_seconds_bucket"
        action = "drop"
      }
      {{- end }}
      {{- if and .Values.prometheusOperatorObjects .Values.prometheusOperatorObjects.serviceMonitors .Values.prometheusOperatorObjects.serviceMonitors.extraMetricProcessingRules }}
      {{ .Values.prometheusOperatorObjects.serviceMonitors.extraMetricProcessingRules | nindent 6 }}
      {{- end }}
      forward_to = [otelcol.receiver.prometheus.default.receiver]
    }

    // Prometheus Operator PodMonitors Discovery
    prometheus.operator.podmonitors "pod_monitors" {
      {{- if .Values.customAlloy.clustering.enabled }}
      clustering {
        enabled = true
      }
      {{- end }}
      forward_to = [otelcol.receiver.prometheus.default.receiver]
    }

    // Prometheus Operator Probes Discovery
    prometheus.operator.probes "probes" {
      {{- if .Values.customAlloy.clustering.enabled }}
      clustering {
        enabled = true
      }
      {{- end }}
      forward_to = [otelcol.receiver.prometheus.default.receiver]
    }
    {{- end }}

    // Kube State Metrics Discovery
    discovery.kubernetes "kube_state_metrics" {
      role = "endpoints"
      selectors {
        role = "endpoints"
        label = "app.kubernetes.io/name=kube-state-metrics"
      }
    }

    discovery.relabel "kube_state_metrics" {
      targets = discovery.kubernetes.kube_state_metrics.targets

      rule {
        source_labels = ["__meta_kubernetes_endpoint_port_name"]
        regex = "http"
        action = "keep"
      }

      // Only set instance label for scrape target identification
      // Do NOT set namespace/service/pod labels here as they would overwrite
      // the actual resource labels provided by kube-state-metrics
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label = "instance"
      }
    }

    prometheus.scrape "kube_state_metrics" {
      targets = discovery.relabel.kube_state_metrics.output
      job_name = "integrations/kubernetes/kube-state-metrics"
      scrape_interval = "60s"
      scrape_timeout = "10s"
      scheme = "http"

      {{- if .Values.customAlloy.clustering.enabled }}
      clustering {
        enabled = true
      }
      {{- end }}

      forward_to = [prometheus.relabel.kube_state_metrics.receiver]
    }

    prometheus.relabel "kube_state_metrics" {
      max_cache_size = 100000
      {{- if .Values.customAlloy.kubeStateMetrics.extraMetricProcessingRules }}
      {{ .Values.customAlloy.kubeStateMetrics.extraMetricProcessingRules | nindent 6 }}
      {{- end }}
      forward_to = [otelcol.receiver.prometheus.default.receiver]
    }

    {{- if .Values.customAlloy.kubelet.enabled }}
    // Kubelet Metrics Discovery
    discovery.kubernetes "kubelet" {
      role = "node"
    }

    discovery.relabel "kubelet" {
      targets = discovery.kubernetes.kubelet.targets

      rule {
        target_label = "__address__"
        replacement  = "kubernetes.default.svc.cluster.local:443"
      }

      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
        replacement   = "/api/v1/nodes/$1/proxy/metrics"
      }

      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "node"
      }

      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "instance"
      }
    }

    prometheus.scrape "kubelet" {
      targets = discovery.relabel.kubelet.output
      job_name = "integrations/kubernetes/kubelet"
      scrape_interval = "60s"
      scrape_timeout = "10s"
      scheme = "https"

      authorization {
        type             = "Bearer"
        credentials_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      }

      tls_config {
        ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }

      {{- if .Values.customAlloy.clustering.enabled }}
      clustering {
        enabled = true
      }
      {{- end }}

      forward_to = [prometheus.relabel.kubelet.receiver]
    }

    // Kubelet cAdvisor Metrics
    discovery.relabel "cadvisor" {
      targets = discovery.kubernetes.kubelet.targets

      rule {
        target_label = "__address__"
        replacement  = "kubernetes.default.svc.cluster.local:443"
      }

      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
        replacement   = "/api/v1/nodes/$1/proxy/metrics/cadvisor"
      }

      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "node"
      }

      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "instance"
      }
    }

    prometheus.scrape "cadvisor" {
      targets = discovery.relabel.cadvisor.output
      job_name = "integrations/kubernetes/cadvisor"
      scrape_interval = "60s"
      scrape_timeout = "10s"
      scheme = "https"

      authorization {
        type             = "Bearer"
        credentials_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      }

      tls_config {
        ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }

      {{- if .Values.customAlloy.clustering.enabled }}
      clustering {
        enabled = true
      }
      {{- end }}

      forward_to = [prometheus.relabel.cadvisor.receiver]
    }

    prometheus.relabel "kubelet" {
      max_cache_size = 100000
      forward_to = [otelcol.receiver.prometheus.default.receiver]
    }

    prometheus.relabel "cadvisor" {
      max_cache_size = 100000
      // Drop high-cardinality container metrics
      rule {
        source_labels = ["__name__"]
        regex = "container_cpu_(cfs_throttled_seconds_total|load_average_10s|system_seconds_total|user_seconds_total)"
        action = "drop"
      }
      rule {
        source_labels = ["__name__"]
        regex = "container_fs_(io_current|io_time_seconds_total|io_time_weighted_seconds_total|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)"
        action = "drop"
      }
      rule {
        source_labels = ["__name__"]
        regex = "container_memory_(mapped_file|swap)"
        action = "drop"
      }
      rule {
        source_labels = ["__name__"]
        regex = "container_(file_descriptors|tasks_state|threads_max)"
        action = "drop"
      }
      rule {
        source_labels = ["__name__", "interface"]
        regex = "container_network_.*;(cali|cilium|cni|lxc|nodelocaldns|tunl).*"
        action = "drop"
      }
      rule {
        source_labels = ["__name__"]
        regex = "container_spec.*"
        action = "drop"
      }
      forward_to = [otelcol.receiver.prometheus.default.receiver]
    }
    {{- end }}

    // OTEL Pipeline
    otelcol.receiver.prometheus "default" {
      output {
        metrics = [otelcol.processor.transform.default.input]
      }
    }

    otelcol.processor.transform "default" {
      error_mode = "ignore"
      metric_statements {
        context = "resource"
        statements = [
          `set(attributes["cluster"], "{{ .Values.clusterName }}")`,
          `set(attributes["k8s.cluster.name"], "{{ .Values.clusterName }}")`,
          {{- if .Values.customAlloy.attributeCleanup.enabled }}
          // Attribute cleanup - remove high-cardinality attributes (matches k8s-monitoring)
          `delete_key(attributes, "process.pid")`,
          `delete_key(attributes, "process.parent_pid")`,
          `delete_key(attributes, "process.executable.path")`,
          `delete_key(attributes, "process.command_line")`,
          `delete_key(attributes, "process.command_args")`,
          `delete_key(attributes, "process.owner")`,
          `delete_key(attributes, "process.runtime.version")`,
          `delete_key(attributes, "process.runtime.description")`,
          `delete_key(attributes, "host.ip")`,
          `delete_key(attributes, "host.mac")`,
          `delete_key(attributes, "k8s.pod.start_time")`,
          `delete_key(attributes, "k8s.pod.uid")`,
          `delete_key(attributes, "container.image.id")`,
          `delete_key(attributes, "container.image.repo_digests")`,
          `delete_key(attributes, "os.description")`,
          `delete_key(attributes, "os.build_id")`,
          {{- end }}
        ]
      }
      metric_statements {
        context = "datapoint"
        statements = [
          `set(attributes["cluster"], "{{ .Values.clusterName }}")`,
          `set(attributes["k8s.cluster.name"], "{{ .Values.clusterName }}")`,
          {{- if .Values.customAlloy.attributePromotion.enabled }}
          // Attribute promotion - move useful attributes from datapoint to resource level
          `set(resource.attributes["deployment.environment"], attributes["deployment_environment"]) where resource.attributes["deployment.environment"] == nil and attributes["deployment_environment"] != nil`,
          `delete_key(attributes, "deployment_environment") where attributes["deployment_environment"] == resource.attributes["deployment.environment"]`,
          `set(resource.attributes["deployment.environment.name"], attributes["deployment_environment_name"]) where resource.attributes["deployment.environment.name"] == nil and attributes["deployment_environment_name"] != nil`,
          `delete_key(attributes, "deployment_environment_name") where attributes["deployment_environment_name"] == resource.attributes["deployment.environment.name"]`,
          `set(resource.attributes["service.name"], attributes["service_name"]) where resource.attributes["service.name"] == nil and attributes["service_name"] != nil`,
          `delete_key(attributes, "service_name") where attributes["service_name"] == resource.attributes["service.name"]`,
          // NOTE: service.namespace promotion removed - it causes duplicate job labels
          // when scraping kube-state-metrics. See: https://github.com/grafana/k8s-monitoring-helm/issues/2383
          {{- end }}
        ]
      }
      output {
        metrics = [otelcol.processor.batch.default.input]
      }
    }

    {{- $batchSize := 2000 }}
    {{- $batchMaxSize := 4000 }}
    {{- range .Values.otlp.destinations }}
    {{- if and .processors .processors.batch }}
    {{- $batchSize = default 2000 .processors.batch.size }}
    {{- $batchMaxSize = default 4000 .processors.batch.maxSize }}
    {{- end }}
    {{- end }}

    otelcol.processor.batch "default" {
      timeout = "2s"
      send_batch_size = {{ $batchSize }}
      send_batch_max_size = {{ $batchMaxSize }}
      output {
        metrics = [
          {{- range $i, $dest := .Values.otlp.destinations }}
          {{- $metricsEnabled := true }}
          {{- if and $dest.metrics (hasKey $dest.metrics "enabled") }}
          {{- $metricsEnabled = $dest.metrics.enabled }}
          {{- end }}
          {{- if $metricsEnabled }}
          otelcol.exporter.otlphttp.{{ $dest.name }}.input,
          {{- end }}
          {{- end }}
        ]
      }
    }

    {{- range .Values.otlp.destinations }}

    {{- if .secret }}
    // Secret for {{ .name }}
    remote.kubernetes.secret "{{ .name }}" {
      name      = "{{ .secret.name }}"
      namespace = "{{ default $.Release.Namespace .secret.namespace }}"
    }

    {{- if not .noAuth }}
    // Auth for {{ .name }}
    otelcol.auth.basic "{{ .name }}" {
      username = convert.nonsensitive(remote.kubernetes.secret.{{ .name }}.data["username"])
      password = remote.kubernetes.secret.{{ .name }}.data["apiKey"]
    }
    {{- end }}
    {{- end }}

    // Exporter for {{ .name }}
    otelcol.exporter.otlphttp "{{ .name }}" {
      client {
        endpoint = "{{ .url }}"
        {{- if and .secret (not .noAuth) }}
        auth = otelcol.auth.basic.{{ .name }}.handler
        {{- end }}
        {{- if and .secret (not .noAuth) }}
        headers = {
          "X-Scope-OrgID" = convert.nonsensitive(remote.kubernetes.secret.{{ .name }}.data["tenantId"]),
        }
        {{- else if .tenantId }}
        headers = {
          "X-Scope-OrgID" = "{{ .tenantId }}",
        }
        {{- end }}
        tls {
          insecure = {{ if or (hasPrefix "http://" .url) .insecure }}true{{ else }}false{{ end }}
          insecure_skip_verify = {{ if .insecureSkipVerify }}true{{ else }}false{{ end }}
        }
      }
      retry_on_failure {
        enabled = true
        initial_interval = "5s"
        max_interval = "30s"
        max_elapsed_time = "5m"
      }
      {{- if $.Values.customAlloy.sendingQueue.enabled }}
      sending_queue {
        enabled = true
        {{- if $.Values.customAlloy.sendingQueue.queueSize }}
        queue_size = {{ $.Values.customAlloy.sendingQueue.queueSize }}
        {{- end }}
        {{- if $.Values.customAlloy.sendingQueue.numConsumers }}
        num_consumers = {{ $.Values.customAlloy.sendingQueue.numConsumers }}
        {{- end }}
      }
      {{- end }}
    }
    {{- end }}

    logging {
      level = "info"
    }

    {{- if .Values.customAlloy.liveDebugging.enabled }}
    livedebugging {
      enabled = true
    }
    {{- end }}
{{- end }}
