{{- if .Values.customAlloy.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-custom-alloy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: custom-alloy
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-custom-alloy
  labels:
    app.kubernetes.io/name: custom-alloy
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  # Required for kubernetes service discovery
  - apiGroups: [""]
    resources:
      - endpoints
      - nodes
      - nodes/proxy
      - nodes/metrics
      - pods
      - services
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources:
      - endpointslices
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
  # Required for reading secrets (OTLP credentials)
  - apiGroups: [""]
    resources:
      - secrets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-custom-alloy
  labels:
    app.kubernetes.io/name: custom-alloy
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-custom-alloy
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-custom-alloy
    namespace: {{ .Release.Namespace }}
{{- end }}
