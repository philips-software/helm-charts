{{- if .Values.customAlloy.enabled }}
apiVersion: apps/v1
{{- if .Values.customAlloy.clustering.enabled }}
kind: StatefulSet
{{- else }}
kind: Deployment
{{- end }}
metadata:
  name: {{ .Release.Name }}-custom-alloy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: custom-alloy
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.customAlloy.replicas | default 1 }}
  {{- if .Values.customAlloy.clustering.enabled }}
  serviceName: {{ .Release.Name }}-custom-alloy-headless
  podManagementPolicy: Parallel
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: custom-alloy
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: custom-alloy
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/custom-alloy-configmap.yaml") . | sha256sum }}
        {{- if .Values.spiffe.enabled }}
        checksum/spiffe-helper: {{ include (print $.Template.BasePath "/custom-alloy-spiffe-helper-configmap.yaml") . | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Release.Name }}-custom-alloy
      {{- if .Values.spiffe.enabled }}
      initContainers:
        - name: spiffe-helper-init
          image: {{ .Values.spiffe.helper.image }}
          args:
            - -config
            - /etc/spiffe-helper/spiffe-helper.conf
            - -daemon-mode=false
          resources:
            {{- toYaml .Values.spiffe.helper.resources | nindent 12 }}
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
            - name: spiffe-helper-config
              mountPath: /etc/spiffe-helper
              readOnly: true
            - name: spiffe-jwt
              mountPath: {{ dir .Values.spiffe.jwtPath }}
      {{- end }}
      containers:
        - name: alloy
          # renovate: datasource=docker depName=grafana/alloy
          image: docker.io/grafana/alloy:v1.16.0
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/tmp/alloy
            - --server.http.listen-addr=0.0.0.0:12345
            {{- if .Values.customAlloy.clustering.enabled }}
            - --cluster.enabled=true
            - --cluster.join-addresses={{ .Release.Name }}-custom-alloy-headless.{{ .Release.Namespace }}.svc.cluster.local:12345
            {{- end }}
          ports:
            - name: http
              containerPort: 12345
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.customAlloy.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            {{- if .Values.spiffe.enabled }}
            - name: spiffe-jwt
              mountPath: {{ dir .Values.spiffe.jwtPath }}
              readOnly: true
            {{- end }}
        {{- if .Values.spiffe.enabled }}
        - name: spiffe-helper
          image: {{ .Values.spiffe.helper.image }}
          args:
            - -config
            - /etc/spiffe-helper/spiffe-helper.conf
          resources:
            {{- toYaml .Values.spiffe.helper.resources | nindent 12 }}
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
            - name: spiffe-helper-config
              mountPath: /etc/spiffe-helper
              readOnly: true
            - name: spiffe-jwt
              mountPath: {{ dir .Values.spiffe.jwtPath }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-custom-alloy
        {{- if .Values.spiffe.enabled }}
        - name: spiffe-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
        - name: spiffe-helper-config
          configMap:
            name: {{ .Release.Name }}-custom-alloy-spiffe-helper
        - name: spiffe-jwt
          emptyDir: {}
        {{- end }}
{{- end }}
