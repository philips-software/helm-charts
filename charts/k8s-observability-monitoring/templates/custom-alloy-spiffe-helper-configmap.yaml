{{- if and .Values.customAlloy.enabled .Values.spiffe.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-custom-alloy-spiffe-helper
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: custom-alloy
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  spiffe-helper.conf: |
    agent_address = "/spiffe-workload-api/spire-agent.sock"
    jwt_svids = [
      {
        jwt_audience = "{{ .Values.spiffe.audience }}"
        jwt_svid_file_name = "{{ .Values.spiffe.jwtPath }}"
      }
    ]
{{- end }}
