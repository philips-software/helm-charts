# -- Cluster name for telemetry labeling. Must be set to a non-empty value at install time.
clusterName: ""

# -- OTLP destination configuration for sending telemetry data (metrics, logs, traces)
otlp:
  # -- List of OTLP destinations to send telemetry data to.
  # Each destination requires a pre-created Kubernetes Secret with basic auth credentials.
  #
  # Secret format:
  #   The secret must contain the following keys:
  #   - username: The username for basic authentication
  #   - apiKey: The API key or password for basic authentication
  #
  # Example secret creation:
  #   kubectl create secret generic otlp-gateway-creds \
  #     --from-literal=username=myuser \
  #     --from-literal=apiKey=myapikey
  #
  # Or via YAML:
  #   apiVersion: v1
  #   kind: Secret
  #   metadata:
  #     name: otlp-gateway-creds
  #   type: Opaque
  #   stringData:
  #     username: "myuser"
  #     apiKey: "myapikey"
  #
  destinations: []
  # Example destination configuration:
  #  - name: "otlpGateway"              # Unique name for this destination
  #    url: "https://otlp-gateway.example.com"  # OTLP endpoint URL
  #    secret:
  #      name: "otlp-gateway-creds"     # Name of the Kubernetes Secret
  #      namespace: ""                  # Optional: namespace of the secret (defaults to release namespace)
  #    processors:
  #      batch:
  #        enabled: true                # Enable batch processing (default: true)
  #        size: 2000                   # Items before flush (default: 8192, reduce for large payloads)
  #        maxSize: 4000                # Max items per batch (default: 0 = unlimited)
  #    sendingQueue:
  #      enabled: true                  # Enable sending queue buffer (default: true)
  #      queueSize: 100                 # Max unwritten batches in queue (default: 1000)
  #      numConsumers: 4                # Parallel senders (default: 10)

# -- ArgoCD project name for the k8s-monitoring Application
project:
  name: "default"

# -- Override the upstream chart version (defaults to appVersion in Chart.yaml)
chart:
  version: ""

# -- Feature toggles
features:
  # -- Enable auto-instrumentation for application telemetry
  autoInstrumentation: false
  # -- Enable scraping Prometheus Operator objects (ServiceMonitors, PodMonitors, Probes).
  prometheusOperatorObjects: true
  # -- Enable cluster metrics collection (kube-state-metrics, node-exporter, kubelet, etc.)
  # Set to false if using kube-prometheus-stack which provides these via ServiceMonitors.
  clusterMetrics: false
  # -- Enable the OTLP receiver for application telemetry (traces, metrics, logs from apps).
  # Set to false if you don't need to receive OTLP data from applications.
  applicationObservability: false

# -- Pod logs configuration
podLogs:
  # -- Drop kube-probe logs (liveness/readiness probe requests).
  # These are typically noisy and not useful for debugging.
  dropKubeProbe: false
  # -- Namespaces to exclude from log collection.
  # Useful for filtering out noisy infrastructure namespaces like mimir-system, loki-system.
  excludeNamespaces: []

# -- Prometheus Operator Objects configuration
prometheusOperatorObjects:
  serviceMonitors:
    # -- Label expressions to filter which ServiceMonitors to scrape.
    # Empty by default (scrape all). Example to exclude kube-state-metrics:
    #   - key: "app.kubernetes.io/name"
    #     operator: "NotIn"
    #     values:
    #       - "kube-state-metrics"
    labelExpressions: []
    # -- Extra discovery rules for ServiceMonitors (Alloy relabel config syntax).
    # Applied before scraping to filter/transform targets.
    extraDiscoveryRules: ""
    # -- Extra metric processing rules for ServiceMonitors (Alloy relabel config syntax).
    # Use this to filter/transform metrics after scraping.
    extraMetricProcessingRules: ""
    # -- Drop high-cardinality histogram bucket metrics to reduce storage costs.
    # These metrics have many buckets (le labels) and often account for 300K+ series.
    dropHighCardinalityMetrics:
      # -- Drop apiserver_request_duration_seconds_bucket (~200K series).
      # Keeps _sum and _count for calculating averages; drops individual buckets.
      apiserverRequestDurationBuckets: false
      # -- Drop etcd_request_duration_seconds_bucket (~150K series).
      # Keeps _sum and _count for calculating averages; drops individual buckets.
      etcdRequestDurationBuckets: false
      # -- Drop apiserver_request_sli_duration_seconds_bucket (~145K series).
      # SLI variant of request duration; often redundant with apiserver_request_duration.
      apiserverRequestSliDurationBuckets: false

# -- Cluster metrics configuration (kube-state-metrics, node-exporter, kubelet, etc.)
# Only used when features.clusterMetrics is true.
clusterMetrics:
  kubeStateMetrics:
    # -- Enable scraping kube-state-metrics
    enabled: true
    # -- Deploy kube-state-metrics (set to false if using existing deployment)
    deploy: false
    # -- Namespace where kube-state-metrics is deployed (auto-detected if empty)
    namespace: ""
    # -- Label matchers to find kube-state-metrics service
    labelMatchers:
      app.kubernetes.io/name: kube-state-metrics
    # -- Use the default allowlist of metrics (true) or scrape all metrics (false).
    # Set to false to get all kube-state-metrics including kube_service_info, kube_endpoint_info, etc.
    useDefaultAllowList: false
    # -- Extra metric processing rules for kube-state-metrics (Alloy relabel config syntax).
    # Use this to filter/transform metrics after scraping.
    # Example to drop duplicate scrape jobs caused by Alloy clustering bug:
    #   rule {
    #     source_labels = ["job"]
    #     regex = "crossplane-system/integrations/kubernetes/kube-state-metrics"
    #     action = "drop"
    #   }
    extraMetricProcessingRules: ""
  nodeExporter:
    # -- Enable scraping node-exporter
    enabled: true
    # -- Deploy node-exporter (set to false if using existing deployment)
    deploy: false
  kubelet:
    # -- Enable scraping kubelet metrics (includes volume stats for PVC monitoring)
    enabled: true
    # -- How to access the Kubelet: "direct" (use node IP) or "proxy" (use API Server)
    nodeAddressFormat: direct
    # -- Use the default allowlist of metrics (true) or scrape all metrics (false)
    useDefaultAllowList: true
  kubeletResource:
    # -- Enable scraping kubelet resource metrics (CPU, memory per pod/container)
    enabled: true
    # -- How to access the Kubelet: "direct" (use node IP) or "proxy" (use API Server)
    nodeAddressFormat: direct

# -- Custom Alloy deployment for metrics scraping
# This deploys a separate Alloy instance that can scrape kube-state-metrics
# and optionally replace the upstream alloy-metrics collector entirely.
customAlloy:
  # -- Enable custom Alloy deployment
  enabled: false
  # -- Replace upstream alloy-metrics collector entirely.
  # When true, disables alloy-metrics and customAlloy handles all metrics collection
  # including ServiceMonitors, PodMonitors, and Probes (if prometheusOperatorObjects is enabled).
  replaceUpstreamCollector: false
  # -- Number of replicas
  replicas: 1
  # -- Clustering configuration (for HA with multiple replicas)
  clustering:
    # -- Enable clustering for multi-replica deployments.
    # When enabled, uses StatefulSet instead of Deployment for stable pod identities.
    # This provides better hash ring stability and ordered rolling updates.
    enabled: false
  # -- Live debugging via Alloy UI (port 12345)
  liveDebugging:
    # -- Enable live debugging
    enabled: true
  # -- Sending queue configuration for resilience during destination outages.
  # The queue buffers batches when the destination is unavailable.
  # Without queueSize limit, memory can grow unbounded during outages causing OOM.
  sendingQueue:
    # -- Enable sending queue
    enabled: true
    # -- Maximum number of batches kept in memory (default: 1000 if unset).
    # Lower values prevent OOM during extended outages. Recommended: 100-500.
    queueSize: 500
    # -- Number of parallel consumers sending batches (default: 10 if unset)
    numConsumers: 10
  # -- Remove high-cardinality attributes to reduce storage costs
  # Matches k8s-monitoring attribute cleanup
  attributeCleanup:
    # -- Enable attribute cleanup
    enabled: true
  # -- Promote useful attributes from datapoint to resource level
  attributePromotion:
    # -- Enable attribute promotion (service.name, deployment.environment, etc.)
    # NOTE: service.namespace promotion is disabled as it causes duplicate job labels
    # with kube-state-metrics. See: https://github.com/grafana/k8s-monitoring-helm/issues/2383
    enabled: false
  # -- kube-state-metrics scraping configuration
  kubeStateMetrics:
    # -- Extra metric processing rules (Alloy relabel config syntax)
    extraMetricProcessingRules: ""
  # -- Kubelet metrics scraping configuration (includes PVC volume stats)
  kubelet:
    # -- Enable kubelet and cAdvisor metrics scraping.
    # Provides kubelet_volume_stats_* metrics for PVC capacity monitoring.
    enabled: false
  # -- Resource requests and limits
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

# -- Alloy Logs resource configuration
alloyLogs:
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      memory: 200Mi

# -- Alloy Metrics resource configuration
alloyMetrics:
  resources:
    requests:
      cpu: 300m
      memory: 1536Mi
    limits:
      memory: 3Gi

# -- Kyverno PolicyException configuration
# Creates a PolicyException to allow Alloy pods to run with required capabilities
# (NET_RAW) and hostPath volumes (for log collection).
kyverno:
  # -- Create a Kyverno PolicyException for Alloy pods
  policyException:
    enabled: false
    # -- Name of the Kyverno ClusterPolicy to exempt
    policyName: "enforce-baseline-pod-security-profile"
    # -- Rule names within the policy to exempt
    ruleNames:
      - "enforce-baseline-profile"
