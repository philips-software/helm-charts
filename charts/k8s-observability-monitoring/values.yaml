# -- Cluster name for telemetry labeling. Must be set to a non-empty value at install time.
clusterName: ""

# -- ArgoCD project name for the k8s-monitoring Application
project:
  name: "default"

# -- Override the upstream chart version (defaults to appVersion in Chart.yaml)
chart:
  version: ""

# -- OTLP destinations where telemetry data will be sent.
# Each destination is a map entry with the destination name as key.
# See: https://github.com/grafana/k8s-monitoring-helm/blob/main/charts/k8s-monitoring/docs/destinations/README.md
#
# Set customAlloyOnly: true to exclude a destination from the upstream k8s-monitoring chart
# (it will only be used by customAlloy).
#
# Example:
#   destinations:
#     otlpGateway:
#       type: otlp
#       url: "https://otlp-gateway.example.com/otlp"
#       protocol: http
#       auth:
#         type: basic
#         usernameKey: "username"
#         passwordKey: "apiKey"
#       secret:
#         create: false
#         name: "otlp-gateway-creds"
#       metrics:
#         enabled: true
#       logs:
#         enabled: true
#       traces:
#         enabled: true
#       processors:
#         batch:
#           enabled: true
#           size: 2000
#       sendingQueue:
#         enabled: true
#         queueSize: 100
destinations: {}

# -- SPIFFE authentication configuration
# When enabled, adds spiffe-helper sidecar to customAlloy for JWT token refresh.
# For destinations using SPIFFE, set auth.type: bearerToken with bearerTokenFile.
spiffe:
  enabled: false
  trustDomain: ""
  audience: ""
  jwtPath: /var/run/secrets/spiffe/jwt/token
  # -- Upstream collectors that should receive the spiffe-helper sidecar so they can
  # authenticate to SPIFFE (bearerToken) destinations. Valid values: alloy-logs,
  # alloy-receiver, alloy-metrics. Replaces the manual collectorCommon sidecar injection.
  collectors: []
  helper:
    image: ghcr.io/spiffe/spiffe-helper:0.10.0
    resources:
      requests:
        cpu: 1m
        memory: 16Mi
      limits:
        memory: 32Mi

# -- Prometheus Operator Objects (ServiceMonitors, PodMonitors, Probes)
prometheusOperatorObjects:
  enabled: true
  # -- Destinations to send metrics. Empty = all metrics-capable destinations.
  destinations: []
  serviceMonitors:
    # -- Label expressions to filter which ServiceMonitors to scrape.
    labelExpressions: []
    # -- Extra discovery rules for ServiceMonitors (Alloy relabel config syntax).
    extraDiscoveryRules: ""
    # -- Extra metric processing rules (Alloy relabel config syntax).
    extraMetricProcessingRules: ""
    # -- Metrics tuning to filter metrics.
    metricsTuning:
      # -- Metrics to exclude. Can use regular expressions.
      # Example: ["apiserver_request_duration_seconds_bucket"]
      excludeMetrics: []

# -- Cluster metrics (kubelet, cadvisor)
# Note: kube-state-metrics is handled by customAlloy when enabled.
clusterMetrics:
  enabled: false
  destinations: []
  kubelet:
    enabled: true
    nodeAddressFormat: direct
    metricsTuning:
      useDefaultAllowList: true
  kubeletResource:
    enabled: true
    nodeAddressFormat: direct

# -- Pod logs collection via Loki format
podLogsViaLoki:
  enabled: true
  destinations: []
  # -- Drop kube-probe logs (liveness/readiness probe requests).
  dropKubeProbe: false
  # -- Namespaces to exclude from log collection.
  excludeNamespaces: []

# -- Cilium Hubble L7 flow/access logs collection.
# Tails Cilium's flow export file on each node (via the alloy-logs DaemonSet) and ships it to
# a destination as OTLP logs. The chart does NOT configure Cilium: the operator must enable
# hubble.export on the Cilium side (file path below + allowlist event_type 129).
# Requires alloy-logs to have SPIFFE auth if a target destination uses bearerToken auth:
# add "alloy-logs" to spiffe.collectors.
hubbleFlowLogs:
  enabled: false
  # -- Cilium hubble-export-file-path. The chart mounts this file's parent dir read-only.
  exportFilePath: /var/run/cilium/hubble/events.log
  # -- Destinations to ship flows to. Empty = reuse the destinations resolved for podLogsViaLoki.
  destinations: []
  # -- Max OTLP batch size for flows. Hubble flow JSON is large (~4.5 KB/flow); keep batches
  # under the gateway's gRPC receive limit (commonly 4 MB). 512 ~= 2.3 MB.
  batchMaxSize: 512

# -- Application observability (OTLP receiver for traces, metrics, logs from apps)
applicationObservability:
  enabled: false
  destinations: []
  receivers:
    otlp:
      grpc:
        enabled: true
        port: 4317
      http:
        enabled: true
        port: 4318

# -- Auto-instrumentation for applications
autoInstrumentation:
  enabled: false
  destinations: []

# -- Telemetry services deployment flags
telemetryServices:
  kube-state-metrics:
    deploy: false
  node-exporter:
    deploy: false

# -- Common collector settings (applies to all Alloy instances managed by operator)
collectorCommon:
  alloy:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    # -- Controller settings for pod scheduling
    controller:
      # -- Node affinity to prevent DaemonSets from scheduling on Fargate nodes.
      # Fargate doesn't support DaemonSets, so we exclude nodes with eks.amazonaws.com/compute-type=fargate.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: eks.amazonaws.com/compute-type
                    operator: NotIn
                    values:
                      - fargate

# -- Per-collector settings (overrides collectorCommon for specific collectors)
# Available collectors: alloy-logs, alloy-metrics, alloy-receiver
collectors:
  alloy-logs:
    alloy:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi

# -- Custom Alloy deployment for kube-state-metrics scraping
# Deploys separate Alloy instance with OTEL pipeline for metrics.
# This is preserved from v3.x to maintain the workaround for duplicate job labels.
customAlloy:
  enabled: false
  # -- Replace upstream alloy-metrics collector entirely.
  replaceUpstreamCollector: false
  replicas: 1
  clustering:
    enabled: false
  liveDebugging:
    enabled: true
  sendingQueue:
    enabled: true
    queueSize: 500
    numConsumers: 10
  attributeCleanup:
    enabled: true
  attributePromotion:
    enabled: false
  kubeStateMetrics:
    extraMetricProcessingRules: ""
  kubelet:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  vpa:
    enabled: false
    updateMode: "InPlaceOrRecreate"
    minAllowed:
      memory: 512Mi
    maxAllowed:
      memory: 8Gi

# -- Kyverno PolicyException configuration
kyverno:
  policyException:
    enabled: false
    policyName: "enforce-baseline-pod-security-profile"
    ruleNames:
      - "enforce-baseline-profile"
