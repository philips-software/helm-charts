{{- if and .Values.grafana.authProxy.enabled .Values.grafana.authProxy.caddy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: grafana-caddy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3001
      protocol: TCP
  selector:
    app.kubernetes.io/instance: {{ .Values.grafanaChart.releaseName }}
    app.kubernetes.io/name: grafana
{{- end }}
