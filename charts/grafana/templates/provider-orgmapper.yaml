{{- if .Values.crossplaneProviders.orgmapper.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: provider-orgmapper
  namespace: {{ .Values.argocd.namespace | default "argocd" }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  {{- if .Values.crossplaneProviders.cascadeDelete }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  {{- end }}
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: oci://ghcr.io/philips-software/helm-charts/crossplane-providers
    # renovate: datasource=docker depName=ghcr.io/philips-software/helm-charts/crossplane-providers
    targetRevision: 0.0.35
    path: .
    helm:
      valuesObject:
        providers: [] # Disable default providers
        package:
          version: "v0.6.0"
          registry: "ghcr.io/loafoe"
        extraProviders:
          # Orgmapper - Tenant management for Grafana
          - name: provider-orgmapper
            enabled: true
            debug: {{ .Values.crossplaneProviders.orgmapper.debug }}
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  ignoreDifferences:
    - group: pkg.crossplane.io
      kind: DeploymentRuntimeConfig
      jsonPointers:
        - /spec/deploymentTemplate/spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 8
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
