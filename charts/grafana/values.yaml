# Grafana Helm Chart Configuration
# This chart deploys Grafana with Crossplane provider support and External Secrets integration

# Grafana application configuration
grafana:
  # Enable/disable SSO authentication (boolean)
  ssoAuthEnabled: false
  # Optional SSO connector path to auto-select upstream IDP (e.g., "github", "google")
  # When set, appends to auth_url: ${issuerUrl}/auth/${connector}
  connector: ""
  # Auth proxy configuration (for reverse proxy authentication)
  # See: https://grafana.com/docs/grafana/latest/setup-grafana/configure-security/configure-authentication/auth-proxy/
  authProxy:
    # Enable/disable auth.proxy authentication (boolean)
    enabled: false
    # HTTP header name containing the username or email
    headerName: "X-WEBAUTH-USER"
    # Header property type: "username" or "email"
    headerProperty: "username"
    # Automatically create users on first login
    autoSignUp: true
    # Header containing the user's display name (optional)
    headersName: ""
    # Header containing the user's email (optional)
    headersEmail: ""
    # Header containing the user's login/username (optional)
    headersLogin: ""
    # Header containing the user's groups (optional)
    headersGroups: ""
    # Header containing the user's role (optional)
    headersRole: ""
    # Comma-separated list of trusted proxy IPs (empty allows all)
    whitelist: ""
    # Enable login token for proxy auth
    enableLoginToken: false
    # Sync TTL in minutes (how often to sync user info)
    syncTtl: 60
    # Caddy reverse proxy sidecar configuration
    # When enabled, Caddy runs as a sidecar and auto-injects auth headers for trusted IPs
    caddy:
      # Enable Caddy sidecar for IP-based auto-login
      enabled: false
      # Caddy container image
      image: caddy:2-alpine
      # Username for auto-login from trusted IPs
      autoLoginUser: "viewer"
      # Email for auto-login user (optional)
      autoLoginEmail: ""
      # Role for auto-login user (Viewer, Editor, Admin, or GrafanaAdmin)
      autoLoginRole: "Viewer"
      # List of trusted IP addresses/CIDRs that get auto-login
      # Examples: ["10.0.0.0/8", "192.168.1.0/24", "172.16.0.0/12"]
      trustedIPs: []
      # List of upstream proxy CIDRs to trust for X-Forwarded-For headers
      # Required when traffic passes through a load balancer or ingress gateway
      # Examples: ["10.0.0.0/8", "192.168.0.0/16"]
      trustedProxyCIDRs: []
      # Resource requests and limits for the Caddy sidecar
      resources:
        limits:
          memory: 64Mi
        requests:
          cpu: 10m
          memory: 32Mi
  # Number of Grafana replicas (must be >= 1)
  replicas: 2
  # Resource requests and limits for the Grafana pod
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  # Resource requests and limits for the dashboard download sidecar
  downloadDashboardsResources:
    limits:
      memory: 24Mi
    requests:
      cpu: 10m
      memory: 16Mi
  # List of Grafana plugins to install
  # Examples:
  # - yesoreyeram-infinity-datasource  # Install from plugin catalog
  # - yesoreyeram-infinity-datasource@3.0.0  # Specific version
  # - plugin-name@version@https://url/to/plugin.zip  # From URL
  plugins: []
  ingress:
    enabled: false
    # Hostname for Grafana ingress (alphanumeric characters and hyphens only)
    host: gf
    # Ingress class name (e.g., nginx, alb)
    ingressClassName: nginx
  httpRoute:
    enabled: true
    host: gf
    sharedGatewayName: platform
    sharedGatewayNamespace: kube-system
  tenants: []
  extraInitContainers: []
  extraVolumes: []
  env: {}

grafanaChart:
  # renovate: datasource=helm depName=grafana registryUrl=https://grafana-community.github.io/helm-charts
  version: 11.3.0
  # Helm release name for Grafana
  releaseName: gf

# ArgoCD configuration
argocd:
  # ArgoCD project name for deployment (required, cannot be empty)
  project: default

# Database configuration
database:
  cnpg: true
  # Whether to restore from an existing snapshot
  restoreFromSnapshot: false
  # Snapshot ID to restore from (required if restoreFromSnapshot is true, alphanumeric and hyphens only)
  snapshotId: "grafana-202501201706"
  # CNPG snapshot configuration (only applies when cnpg: true)
  snapshots:
    # Enable periodic volume snapshots
    enabled: false
    # CSI snapshot class name (required when snapshots.enabled is true)
    snapshotClassName: ""
    # Storage class name for CNPG PVCs
    storageClassName: ""
  # Restore from volume snapshot (CNPG only)
  restoreFromVolumeSnapshot:
    enabled: false
    # Source snapshot identifier to restore from
    sourceIdentifier: ""
    # Storage class name for restored PVCs
    storageClassName: ""

# Crossplane providers configuration
crossplaneProviders:
  # Enable/disable Crossplane Grafana provider (boolean)
  grafana:
    enabled: true
    # Enable debug logging for the provider (boolean)
    debug: false
    # List of Grafana datasources to create via Crossplane
    datasources: []
    # Example:
    # - name: Mimir
    #   type: prometheus
    #   uid: mimir
    #   url: http://mimir-gateway.mimir-system.svc.cluster.local/prometheus
    #   accessMode: proxy  # Optional, defaults to proxy
    #   isDefault: false   # Optional, defaults to false
    #   jsonDataEncoded: '{"authType":"default"}'  # Optional
  # Enable/disable Crossplane Orgmapper provider (boolean)
  orgmapper:
    enabled: true
    # Enable debug logging for the provider (boolean)
    debug: false
  # Enable/disable native Crossplane Grafana provider (boolean)
  gf:
    enabled: true
    debug: false
    datasources: []

# Datasource configuration
datasources:
  # Base URL for the datasource gateway service
  gatewayUrl: "http://datasource-gateway.otlp-gateway.svc.cluster.local"
  # Enable/disable individual datasources (all disabled by default)
  mimir:
    enabled: false
  loki:
    enabled: false
  tempo:
    enabled: false

# Environment configuration
environmentConfig:
  # Fully qualified domain name for the cluster (required, must be valid domain format)
  clusterFqdn: ""
  # Resource prefix for the cluster (alphanumeric characters and hyphens only)
  resourcePrefix: ""
